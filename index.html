 <!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>RADAR-FLUX | TERMINAL v4.0</title>
    <style>
        body { 
            background-color: #06080a; 
            color: #d1d5db; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        .header { 
            border-bottom: 2px solid #006e50; 
            padding-bottom: 10px; 
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo { font-size: 32px; font-weight: bold; letter-spacing: 2px; color: #fff; }
        .logo span { color: #006e50; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            gap: 15px; 
        }
        .card { 
            background: #111418; 
            border: 1px solid #2d3436; 
            padding: 15px; 
            border-radius: 4px;
            min-height: 400px;
        }
        .col-12 { grid-column: span 12; }
        .col-4 { grid-column: span 4; }

        .label { 
            font-size: 11px; 
            color: #7a92aa; 
            text-transform: uppercase; 
            margin-bottom: 15px;
            font-weight: bold;
            border-left: 3px solid #006e50;
            padding-left: 8px;
        }

        @media (max-width: 1000px) {
            .col-4 { grid-column: span 12; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <div class="logo">RADAR<span>-FLUX</span></div>
            <div style="font-size: 10px; color: #7a92aa;">GLOBAL EQUITY RADAR MONITOR</div>
        </div>
        <div style="color: #008f60; font-size: 12px; font-weight: bold;">● LIVE FEED</div>
    </div>

    <div class="grid">
        
        <div class="card col-12">
            <div class="label">WORLD MARKET SENTIMENT (MSCI World Proxy)</div>
            <div class="tradingview-widget-container" style="height: 330px;">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                    "interval": "1D",
                    "width": "100%",
                    "isTransparent": true,
                    "height": "100%",
                    "symbol": "CAPITALCOM:WORLD",
                    "showIntervalTabs": true,
                    "locale": "it",
                    "colorTheme": "dark"
                }
                </script>
            </div>
        </div>

        <div class="card col-4">
            <div class="label">EUROPA: EUROSTOXX 600</div>
            <div class="tradingview-widget-container" style="height: 350px;">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                    "interval": "1D",
                    "width": "100%",
                    "isTransparent": true,
                    "height": "100%",
                    "symbol": "INDEX:SXXP",
                    "showIntervalTabs": false,
                    "locale": "it",
                    "colorTheme": "dark"
                }
                </script>
            </div>
        </div>

        <div class="card col-4">
            <div class="label">EMERGENTI: SHANGHAI COMP.</div>
            <div class="tradingview-widget-container" style="height: 350px;">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                    "interval": "1D",
                    "width": "100%",
                    "isTransparent": true,
                    "height": "100%",
                    "symbol": "SSE:000001",
                    "showIntervalTabs": false,
                    "locale": "it",
                    "colorTheme": "dark"
                }
                </script>
            </div>
        </div>

        <div class="card col-4">
            <div class="label">GIAPPONE: NIKKEI 225</div>
            <div class="tradingview-widget-container" style="height: 350px;">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                    "interval": "1D",
                    "width": "100%",
                    "isTransparent": true,
                    "height": "100%",
                    "symbol": "INDEX:NKY",
                    "showIntervalTabs": false,
                    "locale": "it",
                    "colorTheme": "dark"
                }
                </script>
            </div>
        </div>

    </div>

    <div style="text-align: center; margin-top: 30px; font-size: 10px; color: #4b5563;">
        RADAR-FLUX | GLOBAL DASHBOARD v4.0
    </div>
</div>

</body>
</html>
