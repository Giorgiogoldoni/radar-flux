<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>RADAR-FLUX v9.9 | SINGLE ASSET CORE</title>
    <style>
        :root { --bg: #05070a; --card-bg: #0b0f15; --accent: #0091ff; --text: #a0aec0; --border: #1a202c; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; overflow: hidden; }
        .container { max-width: 1600px; margin: 0 auto; height: 95vh; display: flex; flex-direction: column; }
        .header { border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: 900; color: #fff; letter-spacing: 2px; }
        .logo span { color: var(--accent); }
        
        .main-layout { display: grid; grid-template-columns: 1fr 350px; gap: 20px; flex-grow: 1; }
        .chart-area { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
        .sidebar { display: flex; flex-direction: column; gap: 20px; }
        .side-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; flex: 1; }
        
        .tag { background: rgba(0, 145, 255, 0.1); color: var(--accent); padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">RADAR<span>-FLUX</span> <small style="font-size: 10px; opacity: 0.5;">V9.9 DEEP-CORE</small></div>
        <div style="display: flex; gap: 15px; align-items: center;">
            <span class="tag">TARGET: iShares Core MSCI World (SWDA)</span>
            <div id="clock" style="font-size: 12px; font-family: monospace;"></div>
        </div>
    </div>

    <div class="main-layout">
        <div class="chart-area">
            <div class="tradingview-widget-container" style="height: 100%; width: 100%;">
                <div id="tradingview_chart" style="height: 100%;"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                new TradingView.widget({
                  "autosize": true,
                  "symbol": "MIL:SWDA",
                  "interval": "D",
                  "timezone": "Europe/Rome",
                  "theme": "dark",
                  "style": "1",
                  "locale": "it",
                  "toolbar_bg": "#0b0f15",
                  "enable_publishing": false,
                  "hide_side_toolbar": false,
                  "allow_symbol_change": true,
                  "container_id": "tradingview_chart"
                });
                </script>
            </div>
        </div>

        <div class="sidebar">
            <div class="side-card">
                <div style="font-size: 11px; margin-bottom: 10px; font-weight: bold;">SENTIMENT TECNICO</div>
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                    {
                      "interval": "1D", "width": "100%", "isTransparent": true, "height": "100%",
                      "symbol": "MIL:SWDA", "showIntervalTabs": true, "displayMode": "single",
                      "locale": "it", "colorTheme": "dark"
                    }
                    </script>
                </div>
            </div>

            <div class="side-card" style="flex: 0.5;">
                <div style="font-size: 11px; margin-bottom: 10px; font-weight: bold;">DATI FONDAMENTALI</div>
                <div class="tradingview-widget-container">
                    <div class="tradingview-widget-container__widget"></div>
                    <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-symbol-profile.js" async>
                    {
                      "symbol": "MIL:SWDA", "width": "100%", "height": "100%",
                      "colorTheme": "dark", "isTransparent": true, "locale": "it"
                    }
                    </script>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleString('it-IT'); }
    setInterval(updateClock, 1000); updateClock();
</script>
</body>
</html>
