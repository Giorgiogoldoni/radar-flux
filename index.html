    <!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADAR-FLUX | Financial Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #0f172a; 
            color: #f8fafc; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid #1e293b;
            margin-bottom: 30px;
        }
        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            color: #38bdf8;
        }
        .logo span { color: #94a3b8; font-weight: 300; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 15px;
            border: 1px solid #334155;
            height: 450px;
        }
        .card-title {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            color: #38bdf8;
            font-weight: 600;
        }
        
        .footer {
            text-align: center;
            margin-top: 50px;
            color: #64748b;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">RADAR<span>FLUX</span></div>
        <p style="color: #64748b; margin-top: 10px;">Global Market Real-Time Monitor</p>
    </div>

    <div class="grid-container">
        <div class="card" style="grid-column: 1 / -1; height: auto;">
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
                {
                "symbols": [
                    {"proName": "FOREXCOM:SPX500", "title": "S&P 500"},
                    {"proName": "FOREXCOM:NSXUSD", "title": "Nasdaq 100"},
                    {"proName": "FX_IDC:EURUSD", "title": "EUR/USD"},
                    {"proName": "BITSTAMP:BTCUSD", "title": "Bitcoin"}
                ],
                "colorTheme": "dark",
                "isTransparent": true,
                "displayMode": "adaptive",
                "locale": "it"
                }
                </script>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Analisi Tecnica USA (S&P 500)</div>
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                "interval": "1D",
                "width": "100%",
                "isTransparent": true,
                "height": "100%",
                "symbol": "AMEX:SPY",
                "showIntervalTabs": true,
                "locale": "it",
                "colorTheme": "dark"
                }
                </script>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Mercati Europei</div>
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js" async>
                {
                "colorTheme": "dark",
                "dateRange": "12M",
                "showChart": true,
                "locale": "it",
                "width": "100%",
                "height": "100%",
                "isTransparent": true,
                "symbolsGroups": [
                    {
                    "name": "Indici",
                    "symbols": [
                        {"s": "INDEX:DEU40", "title": "DAX 40"},
                        {"s": "INDEX:IT40", "title": "FTSE MIB"},
                        {"s": "INDEX:EU50", "title": "Euro Stoxx 50"}
                    ]
                    }
                ]
                }
                </script>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Sentiment Crypto</div>
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-mini-symbol-overview.js" async>
                {
                "symbol": "BINANCE:BTCUSDT",
                "width": "100%",
                "height": "100%",
                "locale": "it",
                "dateRange": "1D",
                "colorTheme": "dark",
                "trendLineColor": "rgba(41, 98, 255, 1)",
                "underLineColor": "rgba(41, 98, 255, 0.3)",
                "isTransparent": true,
                "autosize": true
                }
                </script>
            </div>
        </div>
    </div>

    <div class="footer">
        RADAR-FLUX Dashboard | Dati forniti da TradingView | Sviluppato per GitHub Pages
    </div>

</body>
</html>
