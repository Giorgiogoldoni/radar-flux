<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>RADAR-FLUX | TERMINAL v5.5</title>
    <style>
        body { background-color: #06080a; color: #d1d5db; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        .container { max-width: 1500px; margin: 0 auto; }
        .header { border-bottom: 2px solid #006e50; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 28px; font-weight: bold; letter-spacing: 2px; color: #fff; }
        .logo span { color: #006e50; }
        .grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 15px; }
        .card { background: #0d1117; border: 1px solid #21262d; padding: 15px; border-radius: 4px; min-height: 380px; }
        .col-12 { grid-column: span 12; }
        .col-6 { grid-column: span 6; }
        .col-4 { grid-column: span 4; }
        .label { font-size: 10px; color: #7a92aa; text-transform: uppercase; margin-bottom: 15px; font-weight: bold; border-left: 3px solid #006e50; padding-left: 8px; }
        @media (max-width: 900px) { .col-6, .col-4 { grid-column: span 12; } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <div class="logo">RADAR<span>-FLUX</span></div>
            <div style="font-size: 10px; color: #7a92aa;">MULTI-ASSET FLOW MONITOR</div>
        </div>
        <div id="clock" style="font-size: 12px; color: #008f60; font-weight: bold;"></div>
    </div>

    <div class="grid">
        <div class="card col-6">
            <div class="label">USA: S&P 500 (SPY)</div>
            <div class="tradingview-widget-container" style="height: 330px;">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                    "interval": "1D",
                    "width": "100%",
                    "isTransparent": true,
                    "height": "100%",
                    "symbol": "AMEX:SPY",
                    "showIntervalTabs": true,
                    "locale": "it",
                    "colorTheme": "dark"
                }
                </script>
            </div>
        </div>

        <div class="card col-6">
            <div class="label">USA: NASDAQ 100 (QQQ)</div>
            <div class="tradingview-widget-container" style="height: 330px;">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                    "interval": "1D",
                    "width": "100%",
                    "isTransparent": true,
                    "height": "100%",
                    "symbol": "NASDAQ:QQQ",
                    "showIntervalTabs": true,
                    "locale": "it",
                    "colorTheme": "dark"
                }
                </script>
            </div>
        </div>

        <div class="card col-4">
            <div class="label">Europa: FEZ (Euro Stoxx 50)</div>
            <div class="tradingview-widget-container" style="height: 330px;">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                    "interval": "1D",
                    "width": "100%",
                    "isTransparent": true,
                    "height": "100%",
                    "symbol": "AMEX:FEZ",
                    "showIntervalTabs": false,
                    "locale": "it",
                    "colorTheme": "dark"
                }
                </script>
            </div>
        </div>

        <div class="card col-4">
            <div class="label">Cina: MCHI (MSCI China)</div>
            <div class="tradingview-widget-container" style="height: 330px;">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                    "interval": "1D",
                    "width": "100%",
                    "isTransparent": true,
                    "height": "100%",
                    "symbol": "NASDAQ:MCHI",
                    "showIntervalTabs": false,
                    "locale": "it",
                    "colorTheme": "dark"
                }
                </script>
            </div>
        </div>

        <div class="card col-4">
            <div class="label">Giappone: EWJ (MSCI Japan)</div>
            <div class="tradingview-widget-container" style="height: 330px;">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                    "interval": "1D",
                    "width": "100%",
                    "isTransparent": true,
                    "height": "100%",
                    "symbol": "AMEX:EWJ",
                    "showIntervalTabs": false,
                    "locale": "it",
                    "colorTheme": "dark"
                }
                </script>
            </div>
        </div>
    </div>
</div>

<script>
    function updateClock() {
        document.getElementById('clock').textContent = "SYSTEM TIME: " + new Date().toLocaleString('it-IT');
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
