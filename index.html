  <!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>RADAR-FLUX | TERMINAL v3.0</title>
    <style>
        body { 
            background-color: #06080a; 
            color: #d1d5db; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 20px;
        }
        .container { max-width: 1500px; margin: 0 auto; }
        
        .header { 
            border-bottom: 2px solid #006e50; 
            padding-bottom: 10px; 
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .logo { font-size: 32px; font-weight: bold; letter-spacing: 2px; color: #fff; }
        .logo span { color: #006e50; }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(12, 1fr); 
            gap: 15px; 
        }
        .card { 
            background: #111418; 
            border: 1px solid #2d3436; 
            padding: 10px; 
            border-radius: 4px;
        }
        .col-12 { grid-column: span 12; }
        .col-6 { grid-column: span 6; }
        .col-3 { grid-column: span 3; }

        .label { 
            font-size: 11px; 
            color: #7a92aa; 
            text-transform: uppercase; 
            margin-bottom: 15px;
            font-weight: bold;
            border-left: 3px solid #006e50;
            padding-left: 8px;
        }

        @media (max-width: 1000px) {
            .col-6, .col-3 { grid-column: span 12; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div>
            <div class="logo">RADAR<span>-FLUX</span></div>
            <div style="font-size: 10px; color: #7a92aa;">MULTI-REGION EQUITY RADAR</div>
        </div>
        <div style="color: #008f60; font-size: 12px;">● LIVE DATA STREAMING</div>
    </div>

    <div class="grid">
        
        <div class="card col-12">
            <div class="label">WORLD EQUITY SENTIMENT (MSCI World Index)</div>
            <div class="tradingview-widget-container" style="height: 380px;">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                    "interval": "1D",
                    "width": "100%",
                    "isTransparent": true,
                    "height": "100%",
                    "symbol": "CAPITALCOM:WORLD",
                    "showIntervalTabs": true,
                    "locale": "it",
                    "colorTheme": "dark"
                }
                </script>
            </div>
        </div>

        <div class="card col-4">
            <div class="label">EUROPE: STOXX 600</div>
            <div class="tradingview-widget-container" style="height: 350px;">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                    "interval": "1D",
                    "width": "100%",
                    "isTransparent": true,
                    "height": "100%",
                    "symbol": "INDEX:SXXP",
                    "showIntervalTabs": false,
                    "locale": "it",
                    "colorTheme": "dark"
                }
                </script>
            </div>
        </div>

        <div class="card col-4">
            <div class="label">EMERGING MARKETS (EEM)</div>
            <div class="tradingview-widget-container" style="height: 350px;">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                    "interval": "1D",
                    "width": "100%",
                    "isTransparent": true,
                    "height": "100%",
                    "symbol": "AMEX:EEM",
                    "showIntervalTabs": false,
                    "locale": "it",
                    "colorTheme": "dark"
                }
                </script>
            </div>
        </div>

        <div class="card col-4">
            <div class="label">JAPAN: NIKKEI 225</div>
            <div class="tradingview-widget-container" style="height: 350px;">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js" async>
                {
                    "interval": "1D",
                    "width": "100%",
                    "isTransparent": true,
                    "height": "100%",
                    "symbol": "INDEX:NKY",
                    "showIntervalTabs": false,
                    "locale": "it",
                    "colorTheme": "dark"
                }
                </script>
            </div>
        </div>

        <div class="card col-12">
            <div class="label">Relative Strength: Regional Overview</div>
            <div style="height: 400px;">
                <div id="tradingview_compare" style="height:100%; width:100%;"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                new TradingView.MediumWidget({
                  "symbols": [
                    ["Europe STOXX 600", "INDEX:SXXP|12M"],
                    ["Emerging Markets", "AMEX:EEM|12M"],
                    ["Nikkei 225", "INDEX:NKY|12M"]
                  ],
                  "chartOnly": false,
                  "width": "100%",
                  "height": "100%",
                  "locale": "it",
                  "colorTheme": "dark",
                  "gridLineColor": "rgba(42, 46, 57, 0)",
                  "fontColor": "#787b86",
                  "isTransparent": true,
                  "autosize": true,
                  "container_id": "tradingview_compare"
                });
                </script>
            </div>
        </div>

    </div>

    <div style="text-align: center; margin: 40px 0; font-size: 10px; color: #4b5563;">
        RADAR-FLUX | NO CRYPTO VERSION | TERMINAL DATA FEED ACTIVE
    </div>
</div>

</body>
</html>
