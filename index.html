<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>RADAR-FLUX v9.7 | GLOBAL ETF SCREENER</title>
    <style>
        body { background-color: #06080a; color: #d1d5db; font-family: 'Courier New', monospace; margin: 0; padding: 15px; }
        .container { max-width: 100%; margin: 0 auto; }
        .header { border-bottom: 2px solid #006e50; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; color: #fff; }
        .logo span { color: #00cf8d; }
        .main-card { background: #0d1117; border: 1px solid #21262d; border-radius: 4px; height: 85vh; padding: 10px; }
        .info-bar { background: #0a192f; border: 1px solid #00cf8d; padding: 10px; border-radius: 4px; margin-bottom: 15px; font-size: 12px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">RADAR<span>-FLUX</span></div>
        <div id="clock" style="font-size: 12px; color: #00cf8d;"></div>
    </div>

    <div class="info-bar">
        <span><b>MOTORE DI RICERCA GLOBALE:</b> 2200+ ETF monitorati (BIT, XETRA, SWX, LSE)</span>
        <span><b>FILTRI ATTIVI:</b> Solo ETF/ETP | Rating tecnico attivo</span>
    </div>

    <div class="main-card">
        <div class="tradingview-widget-container" style="height:100%; width:100%;">
            <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js" async>
            {
              "width": "100%",
              "height": "100%",
              "defaultColumn": "overview",
              "defaultScreen": "general",
              "market": "italy",
              "showToolbar": true,
              "colorTheme": "dark",
              "locale": "it",
              "isTransparent": true,
              "filter": [
                { "left": "type", "operation": "equal", "right": "etf" }
              ],
              "columns": [
                "name",
                "description",
                "close",
                "change",
                "recommendation_any",
                "exchange",
                "market_cap_basic",
                "relative_volume_10d_calc"
              ]
            }
            </script>
        </div>
    </div>
</div>

<script>
    function updateClock() { document.getElementById('clock').textContent = "SYSTEM LIVE: " + new Date().toLocaleString('it-IT'); }
    setInterval(updateClock, 1000); updateClock();
</script>
</body>
</html>
