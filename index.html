<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>RADAR-FLUX v9.5 | ONLY ETF ENGINE</title>
    <style>
        body { background-color: #06080a; color: #d1d5db; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        .container { max-width: 1600px; margin: 0 auto; }
        .header { border-bottom: 2px solid #006e50; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 28px; font-weight: bold; letter-spacing: 2px; color: #fff; }
        .logo span { color: #00cf8d; }
        .grid-triple { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
        .card { background: #0d1117; border: 1px solid #21262d; padding: 15px; border-radius: 4px; height: 650px; }
        .label { font-size: 11px; color: #00cf8d; text-transform: uppercase; margin-bottom: 15px; font-weight: bold; border-left: 3px solid #006e50; padding-left: 10px; }
        .warning-bar { background: #1a110a; border: 1px solid #ff9f43; padding: 10px; border-radius: 4px; margin-bottom: 20px; font-size: 12px; color: #ff9f43; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">RADAR<span>-FLUX</span></div>
        <div id="clock" style="font-size: 12px; color: #00cf8d;"></div>
    </div>

    <div class="warning-bar">
        CRITICAL UPDATE: Filtro "Subtype: ETF" forzato. Se vedi ancora azioni, ricarica la cache del browser (CTRL+F5).
    </div>

    <div class="grid-triple">
        <div class="card">
            <div class="label">1. ETF EQUITY (World/Tech)</div>
            <div class="tradingview-widget-container" style="height:580px;">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js" async>
                {
                  "width": "100%", "height": "100%", "defaultColumn": "overview", "defaultScreen": "general",
                  "market": "italy", "showToolbar": true, "colorTheme": "dark", "locale": "it",
                  "isTransparent": true,
                  "filter": [
                    { "left": "type", "operation": "equal", "right": "etf" },
                    { "left": "subtype", "operation": "equal", "right": "etf" },
                    { "left": "recommendation_any", "operation": "in_range", "right": [3, 5] }
                  ],
                  "columns": ["name", "description", "close", "change", "recommendation_any"]
                }
                </script>
            </div>
        </div>

        <div class="card">
            <div class="label">2. ETF/ETC METALLI & ENERGIA</div>
            <div class="tradingview-widget-container" style="height:580px;">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js" async>
                {
                  "width": "100%", "height": "100%", "defaultColumn": "overview", "defaultScreen": "general",
                  "market": "italy", "showToolbar": true, "colorTheme": "dark", "locale": "it",
                  "isTransparent": true,
                  "filter": [
                    { "left": "type", "operation": "equal", "right": "etf" },
                    { "left": "subtype", "operation": "in_range", "right": ["etf", "etn"] },
                    { "left": "description", "operation": "match", "right": "(Gold|Silver|Oil|Commodity|Physical|Energy)" }
                  ],
                  "columns": ["name", "description", "close", "change", "recommendation_any"]
                }
                </script>
            </div>
        </div>

        <div class="card">
            <div class="label">3. ETF FIXED INCOME (Bonds)</div>
            <div class="tradingview-widget-container" style="height:580px;">
                <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-screener.js" async>
                {
                  "width": "100%", "height": "100%", "defaultColumn": "overview", "defaultScreen": "general",
                  "market": "italy", "showToolbar": true, "colorTheme": "dark", "locale": "it",
                  "isTransparent": true,
                  "filter": [
                    { "left": "type", "operation": "equal", "right": "etf" },
                    { "left": "description", "operation": "match", "right": "(Bond|Treasury|Gov|Corporate|BTP)" }
                  ],
                  "columns": ["name", "description", "close", "change", "recommendation_any"]
                }
                </script>
            </div>
        </div>
    </div>
</div>

<script>
    function updateClock() { document.getElementById('clock').textContent = "SYNC: " + new Date().toLocaleString('it-IT'); }
    setInterval(updateClock, 1000); updateClock();
</script>
</body>
</html>
